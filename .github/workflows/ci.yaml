name: Testing CI

on:
  push: 
    branches: 
      - main

jobs:
  test-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          

      - name: Check node and npm version
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm run ci

      - name: Build project
        run: npm run build

      - name: Run app
        run: npm run start
